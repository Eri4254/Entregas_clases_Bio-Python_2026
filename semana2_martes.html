<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entregas Programación - Bio-Python</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0f1115;
      color: #e6e8ef;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 270px;
      flex-shrink: 0;
      background: #161923;
      border-right: 1px solid #262b3a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding-bottom: 20px;
    }

    .sidebar-title {
      font-size: 1.1rem;
      font-weight: 600;
      padding: 28px 20px 16px;
      margin: 0;
      border-bottom: 1px solid #262b3a;
      color: #e6e8ef;
    }

    .sidebar-title span {
      color: #6c8cff;
      font-weight: 700;
    }

    .tabs {
      display: flex;
      flex-direction: column;
      padding: 12px 10px;
      gap: 2px;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: none;
      background: transparent;
      color: #8b90a3;
      font-size: 0.9rem;
      text-align: left;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      width: 100%;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      color: #e6e8ef;
    }

    .tab-btn.active {
      background: rgba(108, 140, 255, 0.15);
      color: #6c8cff;
      font-weight: 600;
    }

    .tab-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .tab-btn.active .tab-num {
      background: #6c8cff;
      color: #0f1115;
    }

    /* ===== CONTENT ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      background: #0f1115;
    }

    .panel {
      display: none;
      height: 100%;
      flex-direction: column;
    }

    .panel.active {
      display: flex;
    }

    .panel-header {
      margin-bottom: 20px;
    }

    .panel-header h2 {
      margin: 0 0 6px;
      font-size: 1.5rem;
      font-weight: 500;
    }

    .panel-header p {
      margin: 0;
      color: #8b90a3;
      font-size: 0.9rem;
    }

    .pdf-wrapper {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a2f40;
      background: #20232e;
      min-height: 500px;
      position: relative;
    }

    .pdf-wrapper embed,
    .pdf-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .pdf-fallback {
      margin-top: 14px;
      padding: 12px 16px;
      background: #1b1f2b;
      border-radius: 8px;
      color: #8b90a3;
      font-size: 0.9rem;
      border: 1px solid #2a2f40;
    }

    .pdf-fallback a {
      color: #6c8cff;
      text-decoration: none;
      font-weight: 500;
    }

    .pdf-fallback a:hover {
      text-decoration: underline;
    }

    .empty-card {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #2a2f40;
      border-radius: 12px;
      background: #1b1f2b;
      color: #8b90a3;
      font-size: 0.95rem;
      text-align: center;
      padding: 40px;
      min-height: 300px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #161923;
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2f40;
      border-radius: 8px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3d445a;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 720px) {
      .sidebar {
        width: 200px;
      }
      .content {
        padding: 20px 16px;
      }
      .tab-btn {
        font-size: 0.8rem;
        padding: 8px 10px;
      }
      .sidebar-title {
        font-size: 0.95rem;
        padding: 20px 14px 12px;
      }
    }

    @media (max-width: 540px) {
      body {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        max-height: 180px;
        border-right: none;
        border-bottom: 1px solid #262b3a;
      }
      .tabs {
        flex-direction: row;
        flex-wrap: nowrap;
        overflow-x: auto;
        padding: 8px 10px;
        gap: 4px;
      }
      .tab-btn {
        white-space: nowrap;
        flex-shrink: 0;
      }
      .content {
        padding: 16px 12px;
      }
      .pdf-wrapper {
        min-height: 320px;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <h1 class="sidebar-title">Entregas Programación<br><span>Bio-Python</span></h1>
    <nav class="tabs" id="tabs"></nav>
  </aside>

  <main class="content" id="content"></main>

  <script>
    (function() {
      const TOTAL_ENTREGAS = 17;
      const tabsEl = document.getElementById('tabs');
      const contentEl = document.getElementById('content');

      // Construir pestañas
      function buildTabs() {
        for (let i = 1; i <= TOTAL_ENTREGAS; i++) {
          const btn = document.createElement('button');
          btn.className = 'tab-btn';
          btn.dataset.tab = i;
          btn.innerHTML = `<span class="tab-num">${i}</span> Entrega ${i}`;
          btn.addEventListener('click', () => activateTab(i));
          tabsEl.appendChild(btn);
        }
      }

      // Construir paneles
      function buildPanels() {
        for (let i = 1; i <= TOTAL_ENTREGAS; i++) {
          const panel = document.createElement('section');
          panel.className = 'panel';
          panel.id = `panel-${i}`;

          if (i === 1) {
            // Panel 1 con el PDF (Informe semana 1)
            panel.innerHTML = `
              <div class="panel-header">
                <h2>📄 Entrega 1 — Informe semana 1</h2>
                <p>Visualización embebida del archivo <strong>Informe semana 1 - Andrés Ramírez Saumet.pdf</strong></p>
              </div>
              <div class="pdf-wrapper">
                <embed src="Informe semana 1 - Andrés Ramírez Saumet.pdf" type="application/pdf" />
              </div>
              <div class="pdf-fallback">
                ⚡ Si el PDF no se visualiza correctamente, puedes 
                <a href="Informe semana 1 - Andrés Ramírez Saumet.pdf" target="_blank" rel="noopener">abrirlo en una nueva pestaña</a>.
              </div>
            `;
          } else {
            // Paneles futuros (placeholder)
            panel.innerHTML = `
              <div class="panel-header">
                <h2>📌 Entrega ${i}</h2>
                <p>Contenido pendiente por agregar</p>
              </div>
              <div class="empty-card">🗂️ Aún no se ha añadido contenido para esta entrega.</div>
            `;
          }

          contentEl.appendChild(panel);
        }
      }

      // Activar pestaña y panel
      function activateTab(n) {
        // Actualizar botones
        document.querySelectorAll('.tab-btn').forEach((btn) => {
          btn.classList.toggle('active', Number(btn.dataset.tab) === n);
        });

        // Actualizar paneles
        document.querySelectorAll('.panel').forEach((panel) => {
          panel.classList.toggle('active', panel.id === `panel-${n}`);
        });

        // Guardar en hash
        window.location.hash = `entrega-${n}`;
      }

      // Inicializar
      function init() {
        buildTabs();
        buildPanels();

        // Leer hash para pestaña inicial
        const hashMatch = window.location.hash.match(/entrega-(\d+)/);
        let initial = 1;
        if (hashMatch) {
          const num = Number(hashMatch[1]);
          if (num >= 1 && num <= TOTAL_ENTREGAS) initial = num;
        }

        activateTab(initial);
      }

      // Escuchar cambios en el hash (navegación con botones atrás/adelante)
      window.addEventListener('hashchange', () => {
        const hashMatch = window.location.hash.match(/entrega-(\d+)/);
        if (hashMatch) {
          const num = Number(hashMatch[1]);
          if (num >= 1 && num <= TOTAL_ENTREGAS) {
            activateTab(num);
          }
        }
      });

      init();
    })();
  </script>
</body>
</html>

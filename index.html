<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entregas Programación - Bio-Python</title>
  <style>
    :root {
      --bg: #0f1115;
      --sidebar-bg: #161923;
      --sidebar-border: #262b3a;
      --accent: #6c8cff;
      --accent-soft: rgba(108, 140, 255, 0.15);
      --text: #e6e8ef;
      --text-dim: #8b90a3;
      --card-bg: #1b1f2b;
      --card-border: #2a2f40;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 1.05rem;
      line-height: 1.35;
      font-weight: 600;
      color: var(--text);
      padding: 24px 20px 16px;
      margin: 0;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .sidebar-title span {
      color: var(--accent);
      font-weight: 700;
    }

    .tabs {
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 2px;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.92rem;
      text-align: left;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }

    .tab-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .tab-btn.active .tab-num {
      background: var(--accent);
      color: #0f1115;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
    }

    .panel {
      display: none;
      height: 100%;
      flex-direction: column;
    }

    .panel.active {
      display: flex;
    }

    .panel-header {
      margin-bottom: 20px;
    }

    .panel-header h2 {
      margin: 0 0 6px;
      font-size: 1.4rem;
    }

    .panel-header p {
      margin: 0;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .pdf-wrapper {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      background: #20232e;
      min-height: 0;
    }

    .pdf-wrapper embed,
    .pdf-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .pdf-fallback {
      padding: 20px;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .pdf-fallback a {
      color: var(--accent);
    }

    .empty-card {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed var(--card-border);
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--text-dim);
      font-size: 0.95rem;
      text-align: center;
      padding: 40px;
    }

    .error-message {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ff6b6b;
      margin: 10px 0;
    }

    .intro-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--card-border);
    }

    .intro-content .avatar {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .intro-content h2 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: var(--text);
    }

    .intro-content p {
      font-size: 1.1rem;
      color: var(--text-dim);
      max-width: 500px;
      line-height: 1.6;
    }

    .intro-content .highlight {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="sidebar-title">Entregas Programación<br><span>Bio-Python</span></h1>
      <nav class="tabs" id="tabs"></nav>
    </aside>

    <main class="content" id="content"></main>
  </div>

  <script>
    const TOTAL_ENTREGAS = 17;
    const tabsEl = document.getElementById("tabs");
    const contentEl = document.getElementById("content");

    // Función para verificar si un PDF existe
    function pdfExists(semana) {
      return new Promise((resolve) => {
        const xhr = new XMLHttpRequest();
        xhr.open('HEAD', `semana ${semana}.pdf`, true);
        xhr.onload = function() {
          resolve(xhr.status === 200);
        };
        xhr.onerror = function() {
          resolve(false);
        };
        xhr.send();
      });
    }

    function buildTabs() {
      // Botón de Introducción
      const introBtn = document.createElement("button");
      introBtn.className = "tab-btn";
      introBtn.dataset.tab = "intro";
      introBtn.innerHTML = `<span class="tab-num">📖</span> Introducción`;
      introBtn.addEventListener("click", () => activateTab("intro"));
      tabsEl.appendChild(introBtn);

      // Botones de entregas
      for (let i = 1; i <= TOTAL_ENTREGAS; i++) {
        const btn = document.createElement("button");
        btn.className = "tab-btn";
        btn.dataset.tab = i;
        btn.innerHTML = `<span class="tab-num">${i}</span> Entrega ${i}`;
        btn.addEventListener("click", () => activateTab(i));
        tabsEl.appendChild(btn);
      }
    }

    function buildPanels() {
      // Panel de Introducción
      const introPanel = document.createElement("section");
      introPanel.className = "panel";
      introPanel.id = "panel-intro";
      introPanel.innerHTML = `
        <div class="panel-header">
          <h2>👋 Bienvenido</h2>
          <p>Introducción al portafolio de entregas</p>
        </div>
        <div class="intro-content">
          <div class="avatar">🧬</div>
          <h2>Me llamo <span class="highlight">Andrés</span></h2>
          <p>Soy estudiante de pregrado en <span class="highlight">Bio 2026</span>.</p>
          <p style="margin-top: 15px; font-size: 0.95rem; color: var(--text-dim);">
            Este espacio contiene mis entregas del curso de Programación Bio-Python.
          </p>
        </div>
      `;
      contentEl.appendChild(introPanel);

      // Paneles de entregas
      for (let i = 1; i <= TOTAL_ENTREGAS; i++) {
        const panel = document.createElement("section");
        panel.className = "panel";
        panel.id = `panel-${i}`;

        pdfExists(i).then(exists => {
          if (exists) {
            panel.innerHTML = `
              <div class="panel-header">
                <h2>📘 Entrega ${i} — Semana ${i}</h2>
                <p>Visualizando archivo: <code>semana ${i}.pdf</code></p>
              </div>
              <div class="pdf-wrapper">
                <embed src="semana ${i}.pdf" type="application/pdf" />
              </div>
              <div class="pdf-fallback">
                ⚡ Si no puedes visualizar el PDF, puedes 
                <a href="semana ${i}.pdf" target="_blank">descargarlo aquí</a>.
              </div>
            `;
          } else {
            panel.innerHTML = `
              <div class="panel-header">
                <h2>📘 Entrega ${i} — Semana ${i}</h2>
                <p>Archivo no encontrado</p>
              </div>
              <div class="empty-card">
                <div>
                  <div style="font-size: 2rem; margin-bottom: 10px;">📄</div>
                  <p>El archivo <strong>semana ${i}.pdf</strong> no se encuentra disponible.</p>
                  <p style="font-size: 0.85rem; margin-top: 10px;">Asegúrate de que el archivo exista en el directorio.</p>
                </div>
              </div>
            `;
          }
        });

        contentEl.appendChild(panel);
      }
    }

    function activateTab(n) {
      // Activar pestaña
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        const isActive = (btn.dataset.tab === String(n));
        btn.classList.toggle("active", isActive);
      });

      // Activar panel
      document.querySelectorAll(".panel").forEach((panel) => {
        const panelId = panel.id;
        let targetId;

        if (n === "intro") {
          targetId = "panel-intro";
        } else {
          targetId = `panel-${n}`;
        }

        panel.classList.toggle("active", panelId === targetId);
      });

      // Actualizar hash (para la introducción usamos un hash especial)
      if (n === "intro") {
        window.location.hash = "intro";
      } else {
        window.location.hash = `entrega-${n}`;
      }
    }

    function init() {
      buildTabs();
      buildPanels();

      const hash = window.location.hash.replace('#', '');
      let initial;

      if (hash === "intro") {
        initial = "intro";
      } else {
        const hashMatch = hash.match(/entrega-(\d+)/);
        if (hashMatch && Number(hashMatch[1]) >= 1 && Number(hashMatch[1]) <= TOTAL_ENTREGAS) {
          initial = Number(hashMatch[1]);
        } else {
          initial = "intro"; // Por defecto, mostrar introducción
        }
      }

      setTimeout(() => {
        activateTab(initial);
      }, 100);
    }

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entregas Programación - Bio-Python</title>
  <style>
    :root {
      --bg: #0f1115;
      --sidebar-bg: #161923;
      --sidebar-border: #262b3a;
      --accent: #6c8cff;
      --accent-soft: rgba(108, 140, 255, 0.15);
      --text: #e6e8ef;
      --text-dim: #8b90a3;
      --card-bg: #1b1f2b;
      --card-border: #2a2f40;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 1.05rem;
      line-height: 1.35;
      font-weight: 600;
      color: var(--text);
      padding: 24px 20px 16px;
      margin: 0;
      border-bottom: 1px solid var(--sidebar-border);
    }

    .sidebar-title span {
      color: var(--accent);
      font-weight: 700;
    }

    .tabs {
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 2px;
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 0.92rem;
      text-align: left;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .tab-btn:hover {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }

    .tab-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .tab-btn.active .tab-num {
      background: var(--accent);
      color: #0f1115;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
    }

    .panel {
      display: none;
      height: 100%;
      flex-direction: column;
    }

    .panel.active {
      display: flex;
    }

    .panel-header {
      margin-bottom: 20px;
    }

    .panel-header h2 {
      margin: 0 0 6px;
      font-size: 1.4rem;
    }

    .panel-header p {
      margin: 0;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .pdf-wrapper {
      flex: 1;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      background: #20232e;
      min-height: 0;
    }

    .pdf-wrapper embed,
    .pdf-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .pdf-fallback {
      padding: 20px;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .pdf-fallback a {
      color: var(--accent);
    }

    .empty-card {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed var(--card-border);
      border-radius: 12px;
      background: var(--card-bg);
      color: var(--text-dim);
      font-size: 0.95rem;
      text-align: center;
      padding: 40px;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="sidebar-title">Entregas Programación<br><span>Bio-Python</span></h1>
      <nav class="tabs" id="tabs"></nav>
    </aside>

    <main class="content" id="content"></main>
  </div>

  <script>
    const TOTAL_ENTREGAS = 17;
    const tabsEl = document.getElementById("tabs");
    const contentEl = document.getElementById("content");

    function buildTabs() {
      for (let i = 1; i <= TOTAL_ENTREGAS; i++) {
        const btn = document.createElement("button");
        btn.className = "tab-btn";
        btn.dataset.tab = i;
        btn.innerHTML = `<span class="tab-num">${i}</span> Entrega ${i}`;
        btn.addEventListener("click", () => activateTab(i));
        tabsEl.appendChild(btn);
      }
    }

    function buildPanels() {
      for (let i = 1; i <= TOTAL_ENTREGAS; i++) {
        const panel = document.createElement("section");
        panel.className = "panel";
        panel.id = `panel-${i}`;

        if (i === 1) {
          // Panel 1: muestra el contenido extraído del PDF "semana 1.pdf"
          panel.innerHTML = `
            <div class="panel-header">
              <h2>📘 Entrega 1 — Semana 1</h2>
              <p>Contenido extraído del archivo <code>semana 1.pdf</code></p>
            </div>
            <div style="flex:1; overflow-y:auto; background: var(--card-bg); border-radius: 12px; border: 1px solid var(--card-border); padding: 20px; font-family: 'Courier New', monospace; font-size: 0.9rem; line-height: 1.6; white-space: pre-wrap; color: #cfd4e6;">
              <div style="color: var(--accent); font-weight: 600; margin-bottom: 12px;">📄 COSAS IMPORTANTES</div>
              • Las palabras con espacios generalmente se deben conectar con <span style="color: #f7c948;">_barritas_bajas</span><br>
              • Cuando se hace print con variables, se debe poner una <span style="color: #f7c948;">f</span> justo después del primer paréntesis, para que el coso entienda que la<br>
              • Las variables se crean así: <span style="color: #f7c948;">[nombre] = [resultado de la variable]</span><br><br>

              <span style="color: #6c8cff;"># Print normal</span><br>
              print("¡Hola, mundo desde Google Colab!")<br>
              print("Python es increíble")<br>
              print("¡Estoy aprendiendo a programar!")<br><br>

              <span style="color: #6c8cff;"># Variables</span><br>
              nombre = "Pepito"<br>
              edad = 54<br>
              ciudad = "Medellín"<br>
              lenguaje_favorito = "Python!"<br><br>

              print(f"Hola, soy {nombre}")<br>
              print(f"Tengo (edad) años")<br>
              print(f"Vivo en (ciudad)")<br>
              print(f"Mi lenguaje favorito es {lenguaje_favorito}")<br><br>

              <span style="color: #6c8cff;"># Algunas veces, el código funciona sin tener que poner la variable antes, porque las recuerda de una</span><br>
              print(f"Hola, soy {nombre}. Tengo (edad) años")<br><br>

              <span style="color: #6c8cff;"># chatgpt lo hizo de una forma diferente</span><br>
              A1 = "Ana"<br>
              A2 = 25<br>
              print (" Nombre : ", nombre , " Edad : ", edad )<br><br>

              <span style="color: #6c8cff;"># Variables pueden tener nombres diferentes</span><br>
              print(f"hola! soy (A1) y tengo (A2) de edad")<br><br>

              <span style="color: #6c8cff;"># Ensayo variables con operaciones matemáticas</span><br>
              <span style="color: #6c8cff;"># Hay ** y % que son potenciación y el residuo de una división (dudo que lo usemos)</span><br>
              AB = 2+2<br>
              Wou = 2*10+40/2<br><br>

              print(f"suma ensayo (AB)")<br>
              print(f"operación un poquito más complicada (Wou)")<br>
              print("ensayo con texto normal 3+3")<br>
              print("texto normal CON variables que no están de antes 5 + 5 = (5 + 5)")<br>
              print(f"texto normal CON f y variables que no están de antes 5 + 5 = (5 + 5)")<br><br>

              <span style="color: #6c8cff;"># La f es lo que hace que el último ejemplo funcione</span><br><br>

              <span style="color: #f7c948;">▶ SALIDA:</span><br>
              suma ensayo 4<br>
              operación un poquito más complicada 40.0<br>
              ensayo con texto normal 3+3<br>
              texto normal CON variables que no están de antes 5 + 5 = (5 + 5)<br>
              texto normal CON f y variables que no están de antes 5 + 5 = 10<br><br>

              <hr style="border-color: #2a2f40; margin: 16px 0;">

              <span style="color: #6c8cff;"># Así se hacen variables que se pueden rellenar en la respuesta</span><br>
              nombre = input("¿Cuál es tu nombre?")<br>
              print(f"¡Bienvenido a Python, {nombre}!")<br><br>

              <span style="color: #6c8cff;"># Ensayo: crear algo con dos inputs (me quedó malo, corrección abajo)</span><br>
              print("halla dos números cuya división no deje residuos")<br>
              A = input("primer número:")<br>
              B = input("Segundo número:")<br>
              print(f"A % B = {A%B}")<br><br>

              <span style="color: #f7c948;">▶ Error:</span> TypeError: not all arguments converted during string formatting<br><br>

              <span style="color: #6c8cff;"># Este lo corrigió la IA, no sé qué hice mal arriba</span><br>
              print("halla dos números cuya división no deje residuos")<br>
              A_str = input("primer número:")<br>
              B_str = input("Segundo número:")<br>
              A = int(A_str)<br>
              B = int(B_str)<br>
              print(f"A % B = {A%B}")<br><br>

              <span style="color: #f7c948;">▶ SALIDA CORREGIDA:</span><br>
              halla dos números cuya división no deje residuos<br>
              primer número:5<br>
              Segundo número:1<br>
              5%1 = 0
            </div>
            <div class="pdf-fallback">
              ⚡ Este contenido ha sido extraído de <strong>semana 1.pdf</strong>. 
              Puedes consultar el archivo original si lo prefieres.
            </div>
          `;
        } else {
          panel.innerHTML = `
            <div class="panel-header">
              <h2>Entrega ${i}</h2>
              <p>Contenido pendiente por agregar</p>
            </div>
            <div class="empty-card">Aún no se ha añadido contenido para esta entrega.</div>
          `;
        }

        contentEl.appendChild(panel);
      }
    }

    function activateTab(n) {
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.classList.toggle("active", Number(btn.dataset.tab) === n);
      });
      document.querySelectorAll(".panel").forEach((panel) => {
        panel.classList.toggle("active", panel.id === `panel-${n}`);
      });
      window.location.hash = `entrega-${n}`;
    }

    function init() {
      buildTabs();
      buildPanels();

      const hashMatch = window.location.hash.match(/entrega-(\d+)/);
      const initial = hashMatch && Number(hashMatch[1]) >= 1 && Number(hashMatch[1]) <= TOTAL_ENTREGAS
        ? Number(hashMatch[1])
        : 1;

      activateTab(initial);
    }

    init();
  </script>
</body>
</html>
